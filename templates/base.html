{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://kit.fontawesome.com/0a86d3bf39.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{% static 'css/base.css' %}">
    <meta charset="UTF-8">
    <title>Smithy</title>
</head>
<body> 
<div class="col-12">
<div class="align-items-center d-flex flex-nowrap mx-auto position-fixed py-3 row w-100" id="header">
    <div class="col-4 col-md-2 col-lg-1 justify-content-left align-items-center d-flex">
        <a href="/" class="link align-items-center d-flex flex-nowrap">
            <img class="me-2" style="max-width: 25px;" src="{% static 'icons/favicon.ico' %}"> <span class="d-none d-sm-flex">Smithy</span> 
        </a>
    </div>
    <div class="col-auto d-md-block d-none d-flex">
        <a href="/" class="link">Campaigns</a>
    </div>
    <div class="col-auto d-md-block d-none d-flex">
        <a href="/" class="link">Characters</a>
    </div>
    <div class="col-auto d-md-block d-none d-flex">
        <a href="/" class="link">Homebrew</a>
    </div>
    <div class="d-none d-md-block col-md-4 col-lg-5">
        <form id="searchForm">
            <div class="input-group mx-auto w-100" id="searchbar">
                <input class="col-8 form-control ps-3 border-none" type="search" id="search" placeholder="Search"
                       aria-label="Search" aria-describedby="basic-addon2">
                <div class="col-2 col-lg-1 input-group-append">
                    <button class="btn w-100 pe-3" type="submit" id="searchBtn">
                        <i class="fa fa-search"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>
    {% if user.is_authenticated %}
        <div class="col-lg-1 col-md-1 col-6 d-none d-sm-flex ms-auto">
        <a href="/signout" class="hover btn btn-dark p-2 d-inline me-1 pe-3"
               id="signoutBtn">Sign Out</a>
        </div>
    {% else %}
        <div class="col-lg-1 col-md-1 col-6 d-none d-sm-flex justify-content-end ms-auto">
            <a href="/register" class="hover btn btn-dark p-2 d-inline"
               id="registerBtn">Register</a>
        </div>
        <div class="vr d-none d-sm-flex" style="color: #ff5519; opacity:100%; padding:2px"></div>
        <div class="col-lg-1 col-md-1 col-6 d-none d-sm-flex m-0">
            <a href="/signin" class="hover btn btn-dark p-2 d-inline text-nowrap"
               id="signinBtn">Sign In</a>
        </div>
    {% endif %}

</div>
<div class="d-flex m-0 mt-5" id="main">
    {% block content %}
    {% endblock %}
</div>
</div>
</body>
</html>
